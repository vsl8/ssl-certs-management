services:
  certmanager:
    image: ssl-cert-manager:latest
    container_name: ssl-cert-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      # Fallback values if .env not present
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-strong-key}
      - DB_TYPE=${DB_TYPE:-sqlite}
      # For MariaDB, set these in .env:
      # - DB_HOST=mariadb
      # - DB_PORT=3306
      # - DB_NAME=certmanager
      # - DB_USER=certmanager
      # - DB_PASS=secure-password
    volumes:
      # SQLite database persistence
      - certmanager_data:/app/instance
      # Certificate storage - mounted to host /etc/pki/tls/certs
      - /etc/pki/tls/certs:/etc/pki/tls/certs
      - /etc/pki/tls/private:/etc/pki/tls/private
      - /etc/pki/tls/csr_2026:/etc/pki/tls/csr_2026
      # Log files persistence
      - certmanager_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: MariaDB service (uncomment to use)
  # mariadb:
  #   image: mariadb:11
  #   container_name: ssl-cert-manager-db
  #   restart: unless-stopped
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=root-secure-password
  #     - MYSQL_DATABASE=certmanager
  #     - MYSQL_USER=certmanager
  #     - MYSQL_PASSWORD=secure-password
  #   volumes:
  #     - mariadb_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  certmanager_data:
    driver: local
  certmanager_logs:
    driver: local
  # mariadb_data:
  #   driver: local
